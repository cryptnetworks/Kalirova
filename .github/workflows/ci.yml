name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Kalirova.xcodeproj \
            -scheme Kalirova
          swift package resolve

      - name: Build app
        run: |
          xcodebuild \
            -project Kalirova.xcodeproj \
            -scheme Kalirova \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      - name: Run Swift package tests
        run: swift test

      - name: Run Xcode tests
        run: |
          DEVICE_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found; skipping Xcode test action."
            exit 0
          fi
          xcodebuild \
            -project Kalirova.xcodeproj \
            -scheme Kalirova \
            -destination "platform=iOS Simulator,name=${DEVICE_NAME}" \
            -configuration Debug \
            test

      - name: Run SwiftLint if available
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "SwiftLint is not installed or configured; skipping."
          fi
