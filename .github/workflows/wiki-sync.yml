name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync wiki pages
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki
          rsync -a --delete docs/wiki/ wiki/
          cd wiki
          git add .
          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi
          git commit -m "docs: sync wiki"
          git push
