name: Bug report
description: Report a reproducible problem in Kalirova.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: iOS version, device model, Xcode version, and whether this is a simulator or physical device.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, tokens, HealthKit data, or personal health data.
          required: true
