name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync wiki pages
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          WIKI_REMOTE="https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git clone "${WIKI_REMOTE}" wiki; then
            echo "Cloned existing wiki repository."
          else
            echo "Wiki repository does not exist yet; creating initial wiki commit."
            mkdir wiki
            cd wiki
            git init
            git checkout -b master
            git remote add origin "${WIKI_REMOTE}"
            cd ..
          fi
          rsync -a --delete docs/wiki/ wiki/
          cd wiki
          git add .
          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi
          git commit -m "docs: sync wiki"
          git push -u origin HEAD:master
