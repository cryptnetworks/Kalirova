name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '22 10 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  package-audit:
    name: Package Audit
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift package dependency inventory
        run: swift package show-dependencies

      - name: CocoaPods audit if present
        run: |
          if [ -f Podfile.lock ]; then
            pod outdated || true
          else
            echo "No CocoaPods lockfile detected."
          fi

      - name: npm audit if present
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm audit --audit-level=moderate
          else
            echo "No npm lockfile detected."
          fi

      - name: Bundler audit if present
        run: |
          if [ -f Gemfile.lock ]; then
            gem install bundler-audit
            bundle audit check --update
          else
            echo "No Gemfile.lock detected."
          fi

  codeql:
    name: CodeQL
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build for CodeQL
        run: |
          xcodebuild \
            -project Kalirova.xcodeproj \
            -scheme Kalirova \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      - name: Analyze
        uses: github/codeql-action/analyze@v3
